name: RWParcer CI/CD (PROD)

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - "README.md"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  ENVIRONMENT: prod

jobs:
  ci-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret Detection (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build Check
        run: dotnet build --no-restore --configuration Release

      # - name: Run Tests #need to fix tests later: The ConnectionString property has not been initialized
        # run: dotnet test RWParcerCore.Tests/RWParcerCore.Tests.csproj --no-build --configuration Release --verbosity normal

  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Build and Push Images
        run: |
          REPO_LOWER=$(echo "${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          docker build -t ${{ env.REGISTRY }}/$REPO_LOWER:${{ env.ENVIRONMENT }}-latest -t ${{ env.REGISTRY }}/$REPO_LOWER:${{ env.ENVIRONMENT }}-${{ github.sha }} -f Dockerfile .
          docker build -t ${{ env.REGISTRY }}/$REPO_LOWER-psiphon:${{ env.ENVIRONMENT }}-latest -t ${{ env.REGISTRY }}/$REPO_LOWER-psiphon:${{ env.ENVIRONMENT }}-${{ github.sha }} -f Dockerfile.psiphon .
          
      - name: Wait for CI Checks
        uses: lewagon/wait-on-check-action@v1.3.1
        with:
          ref: ${{ github.ref }}
          check-name: 'ci-checks'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 5
          allowed-conclusions: success
          
      - name: Login and Push
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin
          REPO_LOWER=$(echo "${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          docker push ${{ env.REGISTRY }}/$REPO_LOWER:${{ env.ENVIRONMENT }}-latest
          docker push ${{ env.REGISTRY }}/$REPO_LOWER:${{ env.ENVIRONMENT }}-${{ github.sha }}
          docker push ${{ env.REGISTRY }}/$REPO_LOWER-psiphon:${{ env.ENVIRONMENT }}-latest
          docker push ${{ env.REGISTRY }}/$REPO_LOWER-psiphon:${{ env.ENVIRONMENT }}-${{ github.sha }}

  deploy-prod:
    needs: [ci-checks, build]
    runs-on: self-hosted
    environment: 
      name: production
    steps:
      - uses: actions/checkout@v4 

      - name: Prepare Infrastructure
        run: |
          if [ ! -d "/var/lib/rwparcer/data" ]; then
            echo "Warning: /var/lib/rwparcer/data does not exist. Creating with sudo..."
          fi

      - name: Docker Deploy to Production
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          REPO_LOWER=$(echo "${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          export IMAGE_TAG=${{ env.ENVIRONMENT }}-${{ github.sha }}
          export COMPOSE_PROJECT_NAME="rwparcer-${{ env.ENVIRONMENT }}"
          export APPSETTINGS_JSON='${{ secrets.PROD_APP_SETTINGS_JSON }}'
          docker pull ghcr.io/$REPO_LOWER:$IMAGE_TAG
          docker pull ghcr.io/$REPO_LOWER-psiphon:$IMAGE_TAG
          docker compose -f docker-compose.yml pull
          docker compose -f docker-compose.yml up -d --remove-orphans