name: RWParcer CI/CD

on:
  push:
    branches:
      - dev
      - main

    paths-ignore:
      - README.md

  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:

          - image: parser
            dockerfile: Dockerfile
            context: .

          - image: proxy-manager
            dockerfile: proxy-manager/Dockerfile
            context: proxy-manager

    steps:
      - uses: actions/checkout@v4
      
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Set image tags
        id: vars
        run: |

          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')

          if [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            ENV=prod
          else
            ENV=dev
          fi

          echo "repo=$REPO" >> $GITHUB_OUTPUT
          echo "env=$ENV" >> $GITHUB_OUTPUT

      - uses: docker/build-push-action@v6

        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/${{ steps.vars.outputs.repo }}${{ matrix.image == 'parser' && '' || format('-{0}', matrix.image) }}:${{ steps.vars.outputs.env }}-latest
            ghcr.io/${{ steps.vars.outputs.repo }}${{ matrix.image == 'parser' && '' || format('-{0}', matrix.image) }}:${{ steps.vars.outputs.env }}-${{ github.sha }}

  deploy-dev:
    if: github.ref_name == 'dev'
    needs: build
    runs-on: self-hosted
    environment:
      name: development
    steps:
      - uses: actions/checkout@v4
      - run: ./scripts/deploy.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          IMAGE_TAG: dev-${{ github.sha }}
          APPSETTINGS_JSON: ${{ secrets.DEV_APP_SETTINGS_JSON }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_PORT: 5433
          DATA_DIR: "/var/lib/rwparcer-dev/data"
          PROXY_DB_PATH: "/var/lib/rwparcer-dev/proxies.db"

  deploy-prod:
    if: github.ref_name == 'main'
    needs: build
    runs-on: self-hosted
    environment:
      name: production
    steps:
      - uses: actions/checkout@v4
      - run: ./scripts/deploy.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          IMAGE_TAG: prod-${{ github.sha }}
          APPSETTINGS_JSON: ${{ secrets.PROD_APP_SETTINGS_JSON }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_PORT: ${{ secrets.POSTGRES_PORT }}
          DATA_DIR: "/var/lib/rwparcer-prod/data"
          PROXY_DB_PATH: "/var/lib/rwparcer-prod/proxies.db"

          PROXY_FILE_PATH: ${{ secrets.PROXY_FILE_PATH }}