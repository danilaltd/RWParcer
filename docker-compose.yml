services:
  psiphon:
    build: 
      context: .
      dockerfile: Dockerfile.psiphon
    volumes:
      - ./env/data:/app/data
    environment:
      NODE_ID_FROM_HOSTNAME: "1"
    deploy:
      replicas: 10
    restart: always


  parcer:
    build: 
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./env/appsettings.json:/etc/secrets/appsettings.json:ro
      - ./env/data:/app/data
    restart: unless-stopped
    environment:
      PSIPHON_REPLICAS: 10