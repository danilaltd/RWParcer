services:
  psiphon:
    image: ghcr.io/danilaltd/rwparcer-psiphon:latest
    volumes:
      - /var/lib/rwparcer/data:/app/data
    environment:
      NODE_ID_FROM_HOSTNAME: "1"
    deploy:
      replicas: 10
    restart: always


  parcer:
    image: ghcr.io/danilaltd/rwparcer:latest
    volumes:
      - ./env/appsettings.json:/etc/secrets/appsettings.json:ro
      - /var/lib/rwparcer/data:/app/data
    restart: unless-stopped
    environment:
      PSIPHON_REPLICAS: 10