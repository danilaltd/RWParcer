services:
  psiphon:
    image: ghcr.io/danilaltd/rwparcer-psiphon:prod-latest
    volumes:
      - /var/lib/rwparcer/data:/app/data
    environment:
      NODE_ID_FROM_HOSTNAME: "1"
    deploy:
      replicas: 10
    restart: always


  parcer:
    image: ghcr.io/danilaltd/rwparcer:prod-latest
    volumes:
      - /var/lib/rwparcer/data:/app/data
    restart: unless-stopped
    environment:
      APPSETTINGS_JSON: ${APPSETTINGS_JSON}
      PSIPHON_REPLICAS: ${PSIPHON_REPLICAS:-10}