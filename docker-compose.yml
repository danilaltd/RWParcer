services:
  proxy-manager:
    image: ${PROXY_MANAGER_IMAGE:-rwparcer-proxy-manager}
    build:
      context: ./proxy-manager
      dockerfile: Dockerfile
    volumes:
      - ${PROXY_DB_PATH:-/var/lib/rwparcer/proxies.db}:/app/data/proxies.db
    environment:
      PROXY_MANAGER_PORT: ${PROXY_MANAGER_PORT:-8080}
      HEALTH_CHECK_INTERVAL: ${HEALTH_CHECK_INTERVAL:-30}
      PROXY_DB_PATH: /app/data/proxies.db
    restart: ${RESTART_POLICY:-always}

  parcer:
    image: ${PARSER_IMAGE:-rwparcer}
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ${DATA_DIR:-/var/lib/rwparcer/data}:/app/data
    restart: ${PARSER_RESTART_POLICY:-unless-stopped}
    environment:
      APPSETTINGS_JSON: ${APPSETTINGS_JSON}
      PROXY_MANAGER_URL: ${PROXY_MANAGER_URL:-http://proxy-manager:8080}