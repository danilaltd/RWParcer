services:
  proxy-manager:
    image: ${PROXY_MANAGER_IMAGE:-rwparcer-proxy-manager}
    build:
      context: ./proxy-manager
      dockerfile: Dockerfile
    volumes:
      - ${PROXY_DB_PATH:-/var/lib/rwparcer/proxies.db}:/app/data/proxies.db
    environment:
      PROXY_MANAGER_PORT: ${PROXY_MANAGER_PORT:-8080}
      HEALTH_CHECK_INTERVAL: ${HEALTH_CHECK_INTERVAL:-30}
      PROXY_DB_PATH: /app/data/proxies.db
    restart: ${RESTART_POLICY:-always}

  parcer:
    image: ${PARSER_IMAGE:-rwparcer}
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ${DATA_DIR:-/var/lib/rwparcer/data}:/app/data
    restart: ${PARSER_RESTART_POLICY:-unless-stopped}
    environment:
      APPSETTINGS_JSON: ${APPSETTINGS_JSON}
      PROXY_MANAGER_URL: ${PROXY_MANAGER_URL:-http://proxy-manager:8080}
      DatabaseSettings__ConnectionString:        "User Id=${POSTGRES_USER:-rw_user};Password=${POSTGRES_PASSWORD:-test_password};Server=postgres_db;Port=5432;Database=${POSTGRES_DB:-core_db}"
      DatabaseSettings__SessionConnectionString: "User Id=${POSTGRES_USER:-rw_user};Password=${POSTGRES_PASSWORD:-test_password};Server=postgres_db;Port=5432;Database=sessions_db"
    depends_on:
      - postgres_db

  postgres_db:
    image: postgres:15.8-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sessions_db}
      POSTGRES_USER: ${POSTGRES_USER:-rw_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ${DATA_DIR:-/var/lib/rwparcer/data}/pgdata:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 500M