services:
  proxy-manager:
    image: ghcr.io/danilaltd/rwparcer-proxy-manager:prod-latest
    volumes:
      - /var/lib/rwparcer/proxies.txt:/app/proxies.txt:ro
    environment:
      PROXY_MANAGER_PORT: 8080
      HEALTH_CHECK_INTERVAL: 30
    restart: always


  parcer:
    image: ghcr.io/danilaltd/rwparcer:prod-latest
    volumes:
      - /var/lib/rwparcer/data:/app/data
    restart: unless-stopped
    environment:
      APPSETTINGS_JSON: ${APPSETTINGS_JSON}
      PROXY_MANAGER_URL: ${PROXY_MANAGER_URL:-http://proxy-manager:8080}